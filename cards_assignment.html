<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cards Assignment</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Iosevka+Charon:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&family=Lobster&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        display: flex;
        justify-content: center;
        align-items: center;
        width: 100%;
        height: 100vh;
        background-color: #000022;
      }
      .grid-container {
        display: grid;
        grid-template-columns: 4fr 2fr;
        width: 600px;
        height: 300px;
        border: 1px solid #000;
        border-radius: 5px;
        color: #ffffff;
        background-color: #0e055b;
      }
      .img-frame {
        display: grid;
        grid-template-rows: 1fr 1fr;
        grid-template-columns: 1fr;
        width: 100%;
        height: 300px;
        border-style: solid;
        border-color: black;
        border-right-width: 1px;
        border-top-width: 0;
        border-left-width: 0;
        border-bottom-width: 0;
        border-top-left-radius: 5px;
        border-bottom-left-radius: 5px;
      }
      .img-frame div img {
        width: 100%;
        height: 100%;
        object-fit: contain;
        position: relative;
        top: -2px;
        left: 0;
        border-top-left-radius: 5px;
      }
      .side-panel {
        display: grid;
        grid-template-rows: 1fr 1fr 1fr;
        height: 300px;
      }
      .btn-panel {
        display: grid;
        grid-template-columns: 1fr 1fr;
      }
      .btn-rect {
        display: flex;
        flex-direction: row;
        justify-content: space-around;
        align-items: center;
      }
      .side-panel button {
        height: 40px;
        width: 150px;
        font-size: 20px;
        border-style: none;
        background-color: #190aa4;
        color: white;
        border-radius: 5px;
        transition: all 0.2s ease-in;
        font-family: "Iosevka Charon", sans-serif;
      }

      .side-panel button:hover {
        cursor: pointer;
        height: 60px;
        width: 180px;
        font-size: 30px;
        background-color: #301bf2;
        border-width: 1px;
        border-color: #ffffff;
        border-style: solid;
      }
      .titles {
        width: 100%;
        display: flex;
        flex-direction: column;
        height: 100%;
        justify-content: center;
        align-items: center;
      }
      .titles h1,
      h2 {
        text-decoration: underline;
      }

      /* ============================================
         FIX #1: Add CSS rule for the font class
         The HTML used class="iosevka-charon-light" 
         but there was no CSS to apply the font!
         The font-weight: 300 gives the "light" look.
         ============================================ */
      .iosevka-charon-light {
        font-family: "Iosevka Charon", sans-serif;
        font-weight: 300;
      }

      /* ============================================
         FIX #2: Also apply font to h2 for consistency
         ============================================ */
      .titles h1,
      .titles h2 {
        font-family: "Iosevka Charon", sans-serif;
      }

      .img-frame .btn-rect a img {
        width: 50px;
        height: 50px;
        transition: all 0.2s ease-in;
      }
      .img-frame .btn-rect a img:hover {
        height: 60px;
        width: 60px;
        opacity: 0.9;
        border: 1px solid #ffffff;
        border-radius: 5px;
      }
    </style>
  </head>
  <body>
    <div class="grid-container">
      <div class="img-frame">
        <div><img src="images/glowing_keyboard.jpg" alt="" /></div>
        <div class="btn-rect">
          <a href="#"><img src="images/facebook_logo.png" alt="" /></a>
          <a href="#"><img src="images/whatsapp_logo.png" alt="" /></a>
          <a href="#"><img src="images/X_logo.png" alt="" /></a>
          <a href="#"><img src="images/linkedin_logo.png" alt="" /></a>
          <a href="#"><img src="images/telegram_logo.png" alt="" /></a>
          <a href="#"><img src="images/instagram_logo.png" alt="" /></a>
        </div>
      </div>
      <div class="side-panel">
        <div class="titles">
          <h1 class="iosevka-charon-light">Glow Board</h1>
          <h2>For Bright minds</h2>
        </div>
        <div class="btn-rect"><button>Add to Cart</button></div>
        <div class="btn-rect"><button>Preorder</button></div>
      </div>
    </div>
  </body>
</html>
